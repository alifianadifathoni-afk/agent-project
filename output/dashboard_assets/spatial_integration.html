<!DOCTYPE html>
<html>
<head>
    <title>Michigan Corn Fields - Spatial Integration Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #container { display: flex; height: 100vh; }
        
        #sidebar {
            width: 350px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        
        #sidebar h1 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #1B5E20;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .panel h3 {
            font-size: 0.85em;
            color: #555;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .layer-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            cursor: pointer;
        }
        
        .layer-item input {
            margin-right: 10px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 600;
            color: #333;
        }
        
        #map { flex: 1; }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
            font-size: 0.85em;
        }
        
        .legend-color {
            width: 24px;
            height: 14px;
            border-radius: 3px;
            margin-right: 10px;
        }
        
        .info-card {
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            margin-bottom: 8px;
        }
        
        .info-card h4 {
            color: #1B5E20;
            margin-bottom: 8px;
            font-size: 1em;
        }
        
        .color-scale {
            height: 12px;
            border-radius: 3px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <h1>🌽 Michigan Corn Fields</h1>
            <p style="color: #666; font-size: 0.9em; margin-bottom: 15px;">
                Spatial Integration Dashboard
            </p>
            
            <div class="panel">
                <h3>Data Layers</h3>
                <div class="layer-item">
                    <input type="checkbox" id="layer-fields" checked onchange="toggleLayer('fields')">
                    <span>Field Boundaries</span>
                </div>
                <div class="layer-item">
                    <input type="checkbox" id="layer-ndvi" checked onchange="toggleLayer('ndvi')">
                    <span>NDVI (Vegetation Index)</span>
                </div>
            </div>
            
            <div class="panel">
                <h3>Field Statistics</h3>
                <div class="stat-row">
                    <span class="stat-label">Total Fields</span>
                    <span class="stat-value">3</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total Area</span>
                    <span class="stat-value">6,340 acres</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Avg NDVI</span>
                    <span class="stat-value">0.74</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Avg Soil pH</span>
                    <span class="stat-value">6.7</span>
                </div>
            </div>
            
            <div class="panel">
                <h3>NDVI Legend</h3>
                <div class="color-scale" style="background: linear-gradient(to right, #8B4513, #FFD700, #9ACD32, #228B22, #006400);"></div>
                <div style="display: flex; justify-content: space-between; font-size: 0.8em; color: #666;">
                    <span>0.0 (Bare)</span>
                    <span>1.0 (Dense)</span>
                </div>
            </div>
        </div>
        
        <div id="map"></div>
    </div>
    
    <script>
        var map = L.map('map').setView([44.1814, -84.5637], 8);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        
        var fieldData = {"type": "FeatureCollection", "features": [{"id": "0", "type": "Feature", "properties": {"field_id": "MI2600001", "region": "michigan", "crop_name": "corn", "area_acres": 2668.56, "state": "MI", "county": "Shiawassee", "soil_type": "Convent", "organic_matter_pct": 2.8, "soil_ph": 6.5, "drainage_class": "Moderately well drained", "water_capacity": 0.2, "clay_content_pct": 18, "ndvi_mean": 0.775, "ndvi_min": 0.659, "ndvi_max": 0.852, "std_ndvi": 0.117, "date": "2024-07-15"}, "geometry": {"type": "Polygon", "coordinates": [[[-82.42412437734114, 43.19296449356401], [-82.41373241369027, 43.19296449356401], [-82.41373241369027, 43.20335645721489], [-82.42412437734114, 43.20335645721489], [-82.42412437734114, 43.19296449356401]]]}}, {"id": "1", "type": "Feature", "properties": {"field_id": "MI2600002", "region": "michigan", "crop_name": "corn", "area_acres": 1076.34, "state": "MI", "county": "Gratiot", "soil_type": "Reynolds", "organic_matter_pct": 3.0, "soil_ph": 6.6, "drainage_class": "Moderately well drained", "water_capacity": 0.21, "clay_content_pct": 20, "ndvi_mean": 0.796, "ndvi_min": 0.677, "ndvi_max": 0.876, "std_ndvi": 0.092, "date": "2024-07-15"}, "geometry": {"type": "Polygon", "coordinates": [[[-86.71372152549193, 44.0841007070385], [-86.70712167599703, 44.0841007070385], [-86.70712167599703, 44.090700556533406], [-86.71372152549193, 44.090700556533406], [-86.71372152549193, 44.0841007070385]]]}}, {"id": "2", "type": "Feature", "properties": {"field_id": "MI2600003", "region": "michigan", "crop_name": "corn", "area_acres": 2595.36, "state": "MI", "county": "Saginaw", "soil_type": "Saginaw", "organic_matter_pct": 3.8, "soil_ph": 7.0, "drainage_class": "Poorly drained", "water_capacity": 0.24, "clay_content_pct": 45, "ndvi_mean": 0.651, "ndvi_min": 0.554, "ndvi_max": 0.716, "std_ndvi": 0.061, "date": "2024-07-15"}, "geometry": {"type": "Polygon", "coordinates": [[[-85.39564661791611, 45.15958036536635], [-85.38539818244935, 45.15958036536635], [-85.38539818244935, 45.16982880083313], [-85.39564661791611, 45.16982880083313], [-85.39564661791611, 45.15958036536635]]]}}]};
        
        // NDVI color function
        function getNDVIColor(ndvi) {
            if (ndvi < 0.3) return '#8B4513';
            if (ndvi < 0.5) return '#DAA520';
            if (ndvi < 0.7) return '#9ACD32';
            if (ndvi < 0.85) return '#228B22';
            return '#006400';
        }
        
        var layers = {};
        
        // NDVI-colored field layer
        layers.fields = L.geoJSON(fieldData, {
            style: function(feature) {
                var ndvi = feature.properties.ndvi_mean || 0.5;
                return {
                    color: '#1B5E20',
                    weight: 2,
                    fillColor: getNDVIColor(ndvi),
                    fillOpacity: 0.7
                };
            },
            onEachFeature: function(feature, layer) {
                var props = feature.properties;
                var popupContent = `
                    <div class="info-card">
                        <h4>📍 ${props.field_id}</h4>
                        <div class="stat-row">
                            <span>County:</span>
                            <span>${props.county}</span>
                        </div>
                        <div class="stat-row">
                            <span>Area:</span>
                            <span>${props.area_acres.toFixed(1)} acres</span>
                        </div>
                        <hr style="margin: 8px 0; border: none; border-top: 1px solid #eee;">
                        <div class="stat-row">
                            <span>🌱 Soil Type:</span>
                            <span>${props.soil_type}</span>
                        </div>
                        <div class="stat-row">
                            <span>💧 Drainage:</span>
                            <span>${props.drainage_class}</span>
                        </div>
                        <div class="stat-row">
                            <span>📊 Organic Matter:</span>
                            <span>${props.organic_matter_pct}%</span>
                        </div>
                        <div class="stat-row">
                            <span>⚗️ Soil pH:</span>
                            <span>${props.soil_ph}</span>
                        </div>
                        <hr style="margin: 8px 0; border: none; border-top: 1px solid #eee;">
                        <div class="stat-row">
                            <span>🌿 NDVI Mean:</span>
                            <span style="color: ${getNDVIColor(props.ndvi_mean)}; font-weight: bold;">${props.ndvi_mean.toFixed(3)}</span>
                        </div>
                        <div class="stat-row">
                            <span>📈 NDVI Range:</span>
                            <span>${props.ndvi_min.toFixed(3)} - ${props.ndvi_max.toFixed(3)}</span>
                        </div>
                    </div>
                `;
                layer.bindPopup(popupContent);
            }
        }).addTo(map);
        
        function toggleLayer(name) {
            var checkbox = document.getElementById('layer-' + name);
            if (checkbox.checked) {
                map.addLayer(layers[name]);
            } else {
                map.removeLayer(layers[name]);
            }
        }
        
        // Fit bounds to data
        map.fitBounds(layers.fields.getBounds(), {padding: [50, 50]});
    </script>
</body>
</html>
